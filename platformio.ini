; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
description = 433MHz/315MHz transmitter test with the Arduino framework
default_envs = d1-mini


[env:digispark-tiny]
platform = atmelavr
board = digispark-tiny
framework = arduino
board_build.f_cpu = 8000000L
lib_deps = sui77/rc-switch @ 2.6.3


[env:d1-mini]
platform = espressif8266
board = d1_mini
framework = arduino
upload_port = /dev/cu.wchusbserial*
upload_speed = 921600
monitor_port = /dev/cu.wchusbserial*
monitor_speed = 9600
; Set to 1 to disable device reset when serial monitor is connected
monitor_rts = 0
monitor_dtr = 0
lib_deps =
  https://github.com/vi7/arduino-libs-manchester.git#7da18c3a7c85a6b595cff09603d560ec3751cd24
